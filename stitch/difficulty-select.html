<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Select Difficulty</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #3b82f6;
      --color-primary-dark: #2563eb;
      --color-success: #22c55e;
      --color-success-dark: #16a34a;
      --color-warning: #f59e0b;
      --color-warning-dark: #d97706;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 50%, #fff7ed 100%);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 48px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    .tagline {
      color: var(--color-text-muted);
      font-size: 18px;
      margin-bottom: 48px;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    .title {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 32px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }
    .option {
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .option:hover {
      border-color: var(--color-primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .option.easy:hover { border-color: var(--color-success); }
    .option.medium:hover { border-color: var(--color-primary); }
    .option.hard:hover { border-color: #6366f1; }
    .option-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .easy .option-icon { background: #dcfce7; }
    .medium .option-icon { background: #dbeafe; }
    .hard .option-icon { background: #e0e7ff; }
    .option-content { flex: 1; }
    .option-title {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .option-desc {
      font-size: 14px;
      color: var(--color-text-muted);
    }
    .option-time {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-muted);
      padding: 8px 12px;
      background: var(--color-bg);
      border-radius: 8px;
    }
    .btn {
      width: 100%;
      padding: 18px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--color-primary);
      color: white;
    }
    .btn:hover { background: var(--color-primary-dark); transform: translateY(-1px); }
    .btn:disabled {
      background: var(--color-border);
      color: var(--color-text-muted);
      cursor: not-allowed;
      transform: none;
    }
    .footer {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      color: var(--color-text-muted);
      font-size: 14px;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="logo">◆ Sudoku</div>
  <p class="tagline">Challenge your mind with classic puzzles</p>
  <div class="container">
    <h1 class="title">Select Difficulty</h1>
    <div class="options">
      <div class="option easy">
        <div class="option-icon">🌱</div>
        <div class="option-content">
          <div class="option-title">Easy</div>
          <div class="option-desc">Perfect for beginners. More numbers provided.</div>
        </div>
        <div class="option-time">~5 min</div>
      </div>
      <div class="option medium">
        <div class="option-icon">⚡</div>
        <div class="option-content">
          <div class="option-title">Medium</div>
          <div class="option-desc">Balanced challenge for casual players.</div>
        </div>
        <div class="option-time">~15 min</div>
      </div>
      <div class="option hard">
        <div class="option-icon">🔥</div>
        <div class="option-content">
          <div class="option-title">Hard</div>
          <div class="option-desc">Expert level. Minimal starting numbers.</div>
        </div>
        <div class="option-time">~30+ min</div>
      </div>
    </div>
    <button class="btn">Start New Game</button>
  </div>
  <div class="footer">
    <span class="footer-item">📊 Best: 8:42</span>
    <span class="footer-item">🎯 Games: 47</span>
    <span class="footer-item">🏆 Wins: 42</span>
  </div>
</body>
</html>
