<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Paused</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #3b82f6;
      --color-primary-dark: #2563eb;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .pause-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
    }
    .title {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .timer {
      font-family: var(--font-heading);
      font-size: 48px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 32px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-primary:hover { background: var(--color-primary-dark); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--color-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-border); }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
    }
    .btn-danger:hover { background: #fee2e2; }
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 24px 0;
    }
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    .setting-label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-text-muted);
      font-size: 14px;
    }
    .toggle {
      width: 48px;
      height: 26px;
      background: var(--color-primary);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      right: 2px;
      transition: transform 0.2s;
    }
    .hint-count {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="pause-icon">⏸</div>
    <h1 class="title">Game Paused</h1>
    <div class="timer">12:45</div>
    <div class="actions">
      <button class="btn btn-primary">▶ Resume Game</button>
      <button class="btn btn-secondary">↺ Restart</button>
      <button class="btn btn-danger">🏠 Exit to Menu</button>
    </div>
    <div class="divider"></div>
    <div class="settings">
      <div class="settings-row">
        <span class="setting-label">🔊 Sound Effects</span>
        <div class="toggle"></div>
      </div>
      <div class="settings-row">
        <span class="setting-label">💡 Hints Remaining</span>
        <span class="hint-count">3/3</span>
      </div>
    </div>
  </div>
</body>
</html>
