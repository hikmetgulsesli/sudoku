<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Victory!</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #3b82f6;
      --color-primary-dark: #2563eb;
      --color-success: #22c55e;
      --color-success-dark: #16a34a;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(180deg, #ecfdf5 0%, #f8fafc 100%);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--color-success);
      animation: fall 3s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .trophy {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(251, 191, 36, 0.3);
    }
    .title {
      font-family: var(--font-heading);
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--color-success) 0%, var(--color-success-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 32px;
    }
    .time-display {
      font-family: var(--font-heading);
      font-size: 56px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .time-label {
      font-size: 14px;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .stats-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      margin-bottom: 32px;
    }
    .stats-title {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-name {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-text-muted);
    }
    .stat-value {
      font-family: var(--font-heading);
      font-weight: 600;
    }
    .stat-value.best { color: var(--color-success); }
    .buttons {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }
    .btn {
      flex: 1;
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--color-success);
      color: white;
    }
    .btn-primary:hover { background: var(--color-success-dark); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 2px solid var(--color-border);
    }
    .btn-secondary:hover { border-color: var(--color-primary); }
    .new-record {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="confetti">
    <div class="confetti-piece" style="left: 10%; animation-delay: 0s;"></div>
    <div class="confetti-piece" style="left: 20%; animation-delay: 0.5s; background: #3b82f6;"></div>
    <div class="confetti-piece" style="left: 30%; animation-delay: 1s; background: #f59e0b;"></div>
    <div class="confetti-piece" style="left: 40%; animation-delay: 1.5s;"></div>
    <div class="confetti-piece" style="left: 50%; animation-delay: 0.3s; background: #8b5cf6;"></div>
    <div class="confetti-piece" style="left: 60%; animation-delay: 0.8s;"></div>
    <div class="confetti-piece" style="left: 70%; animation-delay: 1.2s; background: #ec4899;"></div>
    <div class="confetti-piece" style="left: 80%; animation-delay: 0.6s;"></div>
    <div class="confetti-piece" style="left: 90%; animation-delay: 1.8s; background: #3b82f6;"></div>
  </div>
  <div class="trophy">🏆</div>
  <h1 class="title">Puzzle Solved!</h1>
  <p class="subtitle">Medium difficulty conquered</p>
  <span class="new-record">✨ New Personal Best!</span>
  <div class="time-display">08:42</div>
  <div class="time-label">Your Time</div>
  <div class="stats-card">
    <div class="stats-title">Game Statistics</div>
    <div class="stat-row">
      <span class="stat-name">⏱️ Solve Time</span>
      <span class="stat-value">08:42</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">💡 Hints Used</span>
      <span class="stat-value">1/3</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">🎯 Difficulty</span>
      <span class="stat-value">Medium</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">🏆 Best Time</span>
      <span class="stat-value best">08:42</span>
    </div>
  </div>
  <div class="buttons">
    <button class="btn btn-primary">🎮 Play Again</button>
    <button class="btn btn-secondary">🏠 Main Menu</button>
  </div>
</body>
</html>
